spring.application.name=API-GATEWAY
server.port=8080

spring.cloud.gateway.routes[0].id=merchant-service
spring.cloud.gateway.routes[0].uri=lb://MERCHANT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/merchants/**


spring.cloud.gateway.routes[1].id=payment-service
spring.cloud.gateway.routes[1].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/payments/**


spring.cloud.gateway.routes[2].id=auth-service
spring.cloud.gateway.routes[2].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/auth/**

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

logging.level.org.springframework.cloud.gateway=TRACE